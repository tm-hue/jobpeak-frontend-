<html lang="en">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Campaign Results — Jobpeak</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@400;500;600;700&family=Archivo:wght@700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #F4F5F7;
            --surface: #FFFFFF;
            --border: #E4E6EA;
            --text: #111318;
            --text-2: #545B6B;
            --text-3: #8892A4;
            --accent: #0A84FF;
            --accent-2: #E8F3FF;
            --success: #00C07F;
            --warn: #FF6B2B;
            --radius: 10px;
            --radius-lg: 16px;
            --shadow: 0 1px 3px rgba(0,0,0,.08), 0 4px 16px rgba(0,0,0,.04);
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'Work Sans',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; -webkit-font-smoothing:antialiased; }

        .topnav { background:var(--surface); border-bottom:1px solid var(--border); padding:0 32px; height:56px; display:flex; align-items:center; justify-content:space-between; }
        .brand { font-family:'Archivo',sans-serif; font-size:22px; font-weight:800; color:var(--text); text-decoration:none; letter-spacing:-.5px; }
        .brand span { color:#F97316; }
        .nav-link { font-size:14px; font-weight:500; color:var(--text-2); text-decoration:none; padding:6px 12px; border-radius:8px; }
        .nav-link:hover { background:var(--bg); }

        .page { max-width:860px; margin:0 auto; padding:36px 24px 80px; }

        /* Job header */
        .job-header { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-lg); padding:28px; margin-bottom:20px; display:flex; align-items:center; gap:16px; box-shadow:var(--shadow); }
        .job-logo { width:56px; height:56px; border-radius:10px; border:1px solid var(--border); object-fit:cover; background:var(--bg); display:flex; align-items:center; justify-content:center; font-size:22px; flex-shrink:0; overflow:hidden; }
        .job-logo img { width:100%; height:100%; object-fit:cover; }
        .job-title { font-family:'Archivo',sans-serif; font-size:20px; font-weight:800; margin-bottom:4px; }
        .job-meta { font-size:14px; color:var(--text-2); }
        .status-badge { margin-left:auto; padding:6px 14px; border-radius:20px; font-size:12px; font-weight:700; }
        .status-active { background:#F0FFF8; color:var(--success); border:1px solid var(--success); }
        .status-paused { background:#FFF3EC; color:var(--warn); border:1px solid var(--warn); }

        /* Stats grid */
        .stats-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:16px; margin-bottom:20px; }
        @media(max-width:640px) { .stats-grid { grid-template-columns:repeat(2,1fr); } }

        .stat-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-lg); padding:20px; box-shadow:var(--shadow); }
        .stat-label { font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.06em; color:var(--text-3); margin-bottom:8px; }
        .stat-value { font-family:'Archivo',sans-serif; font-size:32px; font-weight:800; color:var(--text); line-height:1; }
        .stat-sub { font-size:12px; color:var(--text-3); margin-top:4px; }
        .stat-card.highlight { border-color:var(--accent); background:var(--accent-2); }
        .stat-card.highlight .stat-value { color:var(--accent); }

        /* Progress bar */
        .progress-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-lg); padding:24px; margin-bottom:20px; box-shadow:var(--shadow); }
        .progress-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:16px; }
        .progress-title { font-size:14px; font-weight:700; }
        .progress-detail { font-size:13px; color:var(--text-2); }
        .progress-bar-wrap { background:var(--bg); border-radius:20px; height:12px; overflow:hidden; margin-bottom:8px; }
        .progress-bar { height:100%; border-radius:20px; background:linear-gradient(90deg,var(--accent),#34D399); transition:width .8s ease; }
        .progress-bar.warn { background:linear-gradient(90deg,var(--warn),#FBBF24); }
        .progress-labels { display:flex; justify-content:space-between; font-size:12px; color:var(--text-3); }

        /* Weekly chart */
        .chart-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-lg); padding:24px; margin-bottom:20px; box-shadow:var(--shadow); }
        .chart-title { font-size:14px; font-weight:700; margin-bottom:20px; }
        .chart-bars { display:flex; align-items:flex-end; gap:12px; height:100px; }
        .chart-bar-wrap { flex:1; display:flex; flex-direction:column; align-items:center; gap:6px; }
        .chart-bar { width:100%; background:var(--accent-2); border-radius:6px 6px 0 0; transition:height .5s ease; min-height:4px; position:relative; }
        .chart-bar:hover { background:var(--accent); }
        .chart-bar-label { font-size:11px; color:var(--text-3); }
        .chart-bar-val { font-size:12px; font-weight:700; color:var(--text-2); }
        .no-data { text-align:center; padding:40px; color:var(--text-3); font-size:14px; }

        /* Distribution */
        .dist-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-lg); padding:24px; margin-bottom:20px; box-shadow:var(--shadow); }
        .dist-title { font-size:14px; font-weight:700; margin-bottom:16px; }
        .dist-row { display:flex; align-items:center; justify-content:space-between; padding:10px 0; border-bottom:1px solid var(--border); }
        .dist-row:last-child { border-bottom:none; }
        .dist-label { font-size:14px; color:var(--text-2); display:flex; align-items:center; gap:8px; }
        .dist-dot { width:8px; height:8px; border-radius:50%; background:var(--success); }
        .dist-dot.inactive { background:var(--text-3); }
        .dist-val { font-size:14px; font-weight:600; color:var(--text); }

        /* Topup CTA */
        .topup-card { background:linear-gradient(135deg,#0A84FF 0%,#0070E0 100%); border-radius:var(--radius-lg); padding:28px; color:#fff; display:flex; align-items:center; justify-content:space-between; gap:20px; margin-bottom:20px; }
        .topup-title { font-family:'Archivo',sans-serif; font-size:18px; font-weight:800; margin-bottom:4px; }
        .topup-sub { font-size:13px; opacity:.85; }
        .topup-btn { background:#fff; color:var(--accent); font-family:'Work Sans',sans-serif; font-size:14px; font-weight:700; padding:12px 24px; border-radius:var(--radius); border:none; cursor:pointer; white-space:nowrap; text-decoration:none; display:inline-block; transition:all .15s; flex-shrink:0; }
        .topup-btn:hover { transform:translateY(-1px); box-shadow:0 4px 12px rgba(0,0,0,.2); }
        .topup-card.low { background:linear-gradient(135deg,var(--warn) 0%,#E85A2A 100%); }
        .topup-card.low .topup-btn { color:var(--warn); }

        /* Loading */
        .loading { text-align:center; padding:80px; }
        .spinner { width:36px; height:36px; border:3px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin .7s linear infinite; margin:0 auto 12px; }
        @keyframes spin { to { transform:rotate(360deg); } }

        /* Share */
        .share-row { display:flex; gap:10px; margin-top:8px; }
        .share-btn { font-size:12px; font-weight:600; color:var(--text-2); border:1px solid var(--border); background:var(--bg); padding:6px 12px; border-radius:8px; cursor:pointer; }
        .share-btn:hover { border-color:var(--accent); color:var(--accent); }

        .updated-at { font-size:12px; color:var(--text-3); text-align:right; margin-top:8px; }
    </style>
</head>
<body>

<!-- ========== JOBPEAK HEADER — replace existing <header> block on every page ========== -->
<style>
.jp-header { position:sticky; top:0; z-index:999; background:#fff; border-bottom:1px solid #E4E6EA; height:60px; display:flex; align-items:center; padding:0 32px; box-shadow:0 1px 3px rgba(0,0,0,.06); }
.jp-header-inner { max-width:900px; margin:0 auto; width:100%; display:flex; align-items:center; justify-content:space-between; }
.jp-header-brand { font-family:'Archivo',sans-serif; font-size:22px; font-weight:800; color:#111318; text-decoration:none; flex-shrink:0; }
.jp-header-brand span { color:#F97316; }
.jp-header-nav { display:flex; align-items:center; gap:8px; }
.jp-header-link { font-family:'Work Sans',sans-serif; font-size:14px; font-weight:500; color:#545B6B; text-decoration:none; padding:6px 12px; border-radius:8px; transition:color .15s; }
.jp-header-link:hover { color:#111318; }
.jp-header-post { font-family:'Work Sans',sans-serif; font-size:14px; font-weight:700; color:#fff; background:#0A84FF; text-decoration:none; padding:8px 18px; border-radius:8px; transition:background .15s; }
.jp-header-post:hover { background:#0070E0; }
@media(max-width:600px) { .jp-header { padding:0 16px; } .jp-header-link { display:none; } }
</style>

<header class="jp-header">
    <div class="jp-header-inner">
        <a href="/jobseeker_search.html" class="jp-header-brand">jobpeak<span>.</span></a>
        <nav class="jp-header-nav">
            <a href="/jobseeker_search.html" class="jp-header-link">Find Jobs</a>
            <a href="/job_builder.html" class="jp-header-post">Post a Job</a>
        </nav>
    </div>
</header>

<div class="page" id="pageContent">
    <div class="loading">
        <div class="spinner"></div>
        <div style="font-size:14px;color:var(--text-3)">Loading campaign results…</div>
    </div>
</div>

<script>
const API = 'https://jobpeak-production.up.railway.app';

async function loadStats() {
    const params = new URLSearchParams(window.location.search);
    const jobId = params.get('job');

    if (!jobId) {
        showError('No job ID provided. Check your link.');
        return;
    }

    try {
        const res = await fetch(`${API}/jobs/${jobId}/stats`);
        if (!res.ok) throw new Error('Job not found');
        const data = await res.json();
        render(data, jobId);
    } catch(e) {
        showError('Could not load campaign data. ' + e.message);
    }
}

function render(data, jobId) {
    const { job, clicks, spend, distribution, weeklyClicks } = data;
    const isLow = clicks.remaining <= 20 && clicks.remaining > 0;
    const isPaused = job.status === 'paused';
    const pct = clicks.percentUsed;

    // Weekly chart
    const maxClicks = Math.max(...(weeklyClicks.map(w => w.clicks) || [1]), 1);
    const chartHtml = weeklyClicks.length > 0 ? `
        <div class="chart-bars">
            ${weeklyClicks.slice(0,4).reverse().map((w, i) => {
                const h = Math.max(8, Math.round((w.clicks / maxClicks) * 100));
                const label = new Date(w.week).toLocaleDateString('en-US', {month:'short', day:'numeric'});
                return `
                <div class="chart-bar-wrap">
                    <div class="chart-bar-val">${w.clicks}</div>
                    <div class="chart-bar" style="height:${h}px"></div>
                    <div class="chart-bar-label">${label}</div>
                </div>`;
            }).join('')}
        </div>
    ` : `<div class="no-data">No click data yet — clicks will appear here as candidates engage with your job.</div>`;

    // Top-up CTA
    const topupUrl = `job_builder.html?topup=true&job_id=${jobId}`;
    let topupHtml = '';
    if (isPaused) {
        topupHtml = `
        <div class="topup-card low">
            <div>
                <div class="topup-title">⏸ Your campaign is paused</div>
                <div class="topup-sub">You've used all ${clicks.purchased} clicks. Buy more to go live again instantly.</div>
            </div>
            <a href="${topupUrl}" class="topup-btn">Buy More Clicks →</a>
        </div>`;
    } else if (isLow) {
        topupHtml = `
        <div class="topup-card low">
            <div>
                <div class="topup-title">⚠️ Running low — ${clicks.remaining} clicks left</div>
                <div class="topup-sub">Top up now to keep your job advertising without interruption.</div>
            </div>
            <a href="${topupUrl}" class="topup-btn">Top Up Now →</a>
        </div>`;
    } else if (pct >= 50) {
        topupHtml = `
        <div class="topup-card">
            <div>
                <div class="topup-title">Running well — ${clicks.remaining} clicks remaining</div>
                <div class="topup-sub">Top up anytime to extend your campaign. Volume discounts available.</div>
            </div>
            <a href="${topupUrl}" class="topup-btn">Buy More Clicks</a>
        </div>`;
    }

    const logoHtml = job.logoUrl
        ? `<div class="job-logo"><img src="${job.logoUrl}" alt="logo"></div>`
        : `<div class="job-logo">🏢</div>`;

    const postedDate = new Date(job.createdAt).toLocaleDateString('en-US', {month:'long', day:'numeric', year:'numeric'});

    document.getElementById('pageContent').innerHTML = `
        <!-- Job Header -->
        <div class="job-header">
            ${logoHtml}
            <div>
                <div class="job-title">${job.title}</div>
                <div class="job-meta">${job.company} · ${job.location || ''} · Posted ${postedDate}</div>
                <div class="share-row">
                    <button class="share-btn" onclick="copyLink()">🔗 Copy results link</button>
                    <button class="share-btn" onclick="shareEmail()">✉️ Email report</button>
                </div>
            </div>
            <span class="status-badge ${job.status === 'active' ? 'status-active' : 'status-paused'}">
                ${job.status === 'active' ? '● Live' : '⏸ Paused'}
            </span>
        </div>

        <!-- Stats Grid -->
        <div class="stats-grid">
            <div class="stat-card highlight">
                <div class="stat-label">Clicks Used</div>
                <div class="stat-value">${clicks.used}</div>
                <div class="stat-sub">of ${clicks.purchased} purchased</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Clicks Remaining</div>
                <div class="stat-value">${clicks.remaining}</div>
                <div class="stat-sub">${100 - pct}% of budget left</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Cost Per Click</div>
                <div class="stat-value">$${spend.cpc}</div>
                <div class="stat-sub">${job.category || 'standard'} rate</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Total Spent</div>
                <div class="stat-value">$${spend.total}</div>
                <div class="stat-sub">${distribution.locationCount} locations active</div>
            </div>
        </div>

        <!-- Progress Bar -->
        <div class="progress-card">
            <div class="progress-header">
                <div class="progress-title">Click Budget</div>
                <div class="progress-detail">${clicks.used} used · ${clicks.remaining} remaining</div>
            </div>
            <div class="progress-bar-wrap">
                <div class="progress-bar ${isLow || isPaused ? 'warn' : ''}" style="width:${pct}%"></div>
            </div>
            <div class="progress-labels">
                <span>0</span>
                <span>${Math.round(clicks.purchased / 2)}</span>
                <span>${clicks.purchased} clicks</span>
            </div>
        </div>

        ${topupHtml}

        <!-- Weekly Chart -->
        <div class="chart-card">
            <div class="chart-title">Weekly Click Activity</div>
            ${chartHtml}
        </div>

        <!-- Distribution -->
        <div class="dist-card">
            <div class="dist-title">Ad Distribution</div>
            <div class="dist-row">
                <div class="dist-label"><span class="dist-dot"></span>Talroo Feed</div>
                <div class="dist-val">Active ✓</div>
            </div>
            <div class="dist-row">
                <div class="dist-label"><span class="dist-dot"></span>WhatJobs Feed</div>
                <div class="dist-val">Active ✓</div>
            </div>
            <div class="dist-row">
                <div class="dist-label"><span class="dist-dot"></span>Jobpeak.io Search</div>
                <div class="dist-val">Active ✓</div>
            </div>
            <div class="dist-row">
                <div class="dist-label"><span class="dist-dot ${distribution.locationCount > 0 ? '' : 'inactive'}"></span>Advertising Locations</div>
                <div class="dist-val">${distribution.locationCount} cities</div>
            </div>
        </div>

        <div class="updated-at">Last updated: ${new Date().toLocaleTimeString()}</div>
    `;

    document.title = `${job.title} Results — Jobpeak`;
}

function showError(msg) {
    document.getElementById('pageContent').innerHTML = `
        <div style="text-align:center;padding:80px 24px">
            <div style="font-size:48px;margin-bottom:16px">📊</div>
            <div style="font-family:'Archivo',sans-serif;font-size:22px;font-weight:800;margin-bottom:8px">Results Not Found</div>
            <div style="color:var(--text-2);margin-bottom:24px">${msg}</div>
            <a href="job_builder.html" style="background:var(--accent);color:#fff;padding:12px 24px;border-radius:10px;text-decoration:none;font-weight:700">Post a Job</a>
        </div>
    `;
}

function copyLink() {
    navigator.clipboard.writeText(window.location.href).then(() => alert('Results link copied!'));
}

function shareEmail() {
    const title = document.querySelector('.job-title')?.textContent || 'Job Campaign';
    const body = `Here are the click results for your campaign:\n\n${window.location.href}`;
    window.location.href = `mailto:?subject=Jobpeak Results: ${title}&body=${encodeURIComponent(body)}`;
}

// Auto-refresh every 60 seconds
loadStats();
setInterval(loadStats, 60000);
</script>

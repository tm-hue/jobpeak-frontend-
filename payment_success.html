
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>You're Live! — Jobpeak</title>
    <link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@400;500;600;700&family=Archivo:wght@700;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg:#F4F5F7; --surface:#fff; --border:#E4E6EA; --text:#111318; --text-2:#545B6B; --text-3:#8892A4; --accent:#0A84FF; --success:#00C07F; --orange:#F97316; --radius:16px; --shadow:0 1px 3px rgba(0,0,0,.08),0 8px 24px rgba(0,0,0,.06); }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'Work Sans',sans-serif; background:var(--bg); color:var(--text); -webkit-font-smoothing:antialiased; min-height:100vh; display:flex; flex-direction:column; }
        .jp-header { background:#fff; border-bottom:1px solid var(--border); height:60px; display:flex; align-items:center; padding:0 32px; }
        .jp-header-brand { font-family:'Archivo',sans-serif; font-size:22px; font-weight:800; color:#111318; text-decoration:none; }
        .jp-header-brand span { color:#F97316; }
        .page { max-width:560px; margin:0 auto; padding:64px 24px; flex:1; text-align:center; }
        .success-icon { width:72px; height:72px; background:#F0FFF8; border-radius:50%; display:flex; align-items:center; justify-content:center; margin:0 auto 24px; font-size:32px; border:2px solid var(--success); }
        h1 { font-family:'Archivo',sans-serif; font-size:32px; font-weight:800; margin-bottom:12px; }
        .subtitle { font-size:16px; color:var(--text-2); margin-bottom:40px; line-height:1.6; }
        .stats-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:24px; margin-bottom:24px; box-shadow:var(--shadow); text-align:left; }
        .stats-row { display:flex; justify-content:space-between; align-items:center; padding:10px 0; border-bottom:1px solid var(--border); }
        .stats-row:last-child { border-bottom:none; }
        .stats-label { font-size:14px; color:var(--text-2); }
        .stats-value { font-size:14px; font-weight:700; color:var(--text); }
        .stats-value.green { color:var(--success); }
        .actions { display:flex; flex-direction:column; gap:12px; }
        .btn { display:block; width:100%; padding:15px; font-family:'Work Sans',sans-serif; font-size:15px; font-weight:700; border:none; border-radius:10px; cursor:pointer; text-decoration:none; text-align:center; transition:all 0.2s; }
        .btn-primary { background:var(--accent); color:#fff; }
        .btn-primary:hover { background:#0070E0; }
        .btn-ghost { background:var(--bg); color:var(--text-2); border:1px solid var(--border); }
        .btn-ghost:hover { background:var(--border); }
        .loading { color:var(--text-3); font-size:14px; }
    </style>
</head>
<body>
<header class="jp-header">
    <a href="/jobseeker_search.html" class="jp-header-brand">jobpeak<span>.</span></a>
</header>

<div class="page">
    <div class="success-icon">✅</div>
    <h1>Your job is live!</h1>
    <p class="subtitle" id="subtitle">Your clicks are loaded and your job is now live across Talroo and WhatJobs. Candidates are on their way.</p>

    <div class="stats-card" id="statsCard">
        <div class="loading">Loading job details...</div>
    </div>

    <div class="actions">
        <a href="/results.html" class="btn btn-primary" id="resultsLink">View Results Dashboard</a>
        <a href="/job_builder.html" class="btn btn-ghost">Post Another Job</a>
        <a href="/admin.html" class="btn btn-ghost">Go to Admin</a>
    </div>
</div>

<script>
    const API = 'https://jobpeak-production.up.railway.app';
    const params = new URLSearchParams(window.location.search);
    const jobId = params.get('job');
    const isAdmin = params.get('admin') === 'true';

    if (jobId) {
        document.getElementById('resultsLink').href = `/results.html?job=${jobId}`;

        fetch(`${API}/jobs/${jobId}/stats`)
            .then(r => r.json())
            .then(data => {
                const job = data.job;
                const clicks = data.clicks;
                const spend = data.spend;

                document.getElementById('statsCard').innerHTML = `
                    <div class="stats-row">
                        <span class="stats-label">Job</span>
                        <span class="stats-value">${job.title}</span>
                    </div>
                    <div class="stats-row">
                        <span class="stats-label">Company</span>
                        <span class="stats-value">${job.company}</span>
                    </div>
                    <div class="stats-row">
                        <span class="stats-label">Status</span>
                        <span class="stats-value green">● Live</span>
                    </div>
                    <div class="stats-row">
                        <span class="stats-label">Clicks purchased</span>
                        <span class="stats-value">${clicks.purchased}</span>
                    </div>
                    <div class="stats-row">
                        <span class="stats-label">Click balance</span>
                        <span class="stats-value green">${clicks.remaining} remaining</span>
                    </div>
                    <div class="stats-row">
                        <span class="stats-label">Cost per click</span>
                        <span class="stats-value">$${spend.cpc}</span>
                    </div>
                    <div class="stats-row">
                        <span class="stats-label">Distribution</span>
                        <span class="stats-value">Talroo + WhatJobs</span>
                    </div>
                `;
            })
            .catch(() => {
                document.getElementById('statsCard').innerHTML = `<div class="loading">Could not load job details.</div>`;
            });
    }

    if (isAdmin) {
        document.getElementById('subtitle').textContent = 'Admin bypass — job activated without payment. Click balance loaded.';
    }
</script>
</body>
</html>

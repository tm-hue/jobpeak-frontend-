    <title>Job Detail — Jobpeak</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@400;500;600;700&family=Archivo:wght@600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #F4F5F7;
            --surface: #FFFFFF;
            --border: #E4E6EA;
            --text: #111318;
            --text-2: #545B6B;
            --text-3: #8892A4;
            --accent: #0A84FF;
            --accent-2: #E8F3FF;
            --success: #00C07F;
            --warn: #FF6B2B;
            --radius: 10px;
            --radius-lg: 16px;
            --shadow: 0 1px 3px rgba(0,0,0,.08), 0 4px 16px rgba(0,0,0,.04);
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'Work Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }
        .topnav {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 0 32px;
            height: 56px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky; top: 0; z-index: 100;
        }
        .brand { font-family:'Archivo',sans-serif; font-size:22px; font-weight:800; color:var(--text); text-decoration:none; letter-spacing:-.5px; }
        .brand span { color: #F97316; }
        .nav-link { font-size:14px; font-weight:500; color:var(--text-2); text-decoration:none; padding:6px 12px; border-radius:8px; }
        .nav-link:hover { background:var(--bg); color:var(--text); }

        .page { max-width: 900px; margin: 0 auto; padding: 36px 24px 80px; display: grid; grid-template-columns: 1fr 340px; gap: 20px; align-items: start; }
        @media (max-width: 720px) { .page { grid-template-columns: 1fr; } .sidebar { order: -1; } }

        /* BREADCRUMB */
        .breadcrumb { grid-column: 1/-1; display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--text-3); margin-bottom: 4px; }
        .breadcrumb a { color: var(--accent); text-decoration: none; }
        .breadcrumb a:hover { text-decoration: underline; }

        /* MAIN CARD */
        .main-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 32px; box-shadow: var(--shadow); }

        .job-header { display: flex; gap: 16px; align-items: flex-start; margin-bottom: 24px; }
        .job-logo {
            width: 72px; height: 72px;
            border-radius: 12px;
            border: 1px solid var(--border);
            object-fit: cover;
            flex-shrink: 0;
            background: var(--bg);
            display: flex; align-items: center; justify-content: center;
            font-size: 28px;
            overflow: hidden;
        }
        .job-logo img { width: 100%; height: 100%; object-fit: cover; }
        .job-logo-placeholder { width:72px; height:72px; border-radius:12px; border:1px solid var(--border); background:var(--accent-2); display:flex; align-items:center; justify-content:center; font-size:28px; flex-shrink:0; }

        .job-title-block { flex: 1; }
        .job-title { font-family: 'Archivo',sans-serif; font-size: 26px; font-weight: 800; letter-spacing:-.5px; line-height: 1.2; margin-bottom: 6px; }
        .job-company { font-size: 16px; font-weight: 600; color: var(--text-2); margin-bottom: 10px; }
        .job-tags { display: flex; flex-wrap: wrap; gap: 6px; }
        .tag {
            font-size: 12px; font-weight: 600;
            padding: 4px 10px; border-radius: 20px;
            background: var(--bg); border: 1px solid var(--border);
            color: var(--text-2);
        }
        .tag.pay { background: #F0FFF8; border-color: var(--success); color: #00965D; }
        .tag.bonus { background: #FFF3EC; border-color: var(--warn); color: var(--warn); }
        .tag.cdl { background: var(--accent-2); border-color: var(--accent); color: var(--accent); }

        .divider { height: 1px; background: var(--border); margin: 24px 0; }

        .section-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .08em; color: var(--text-3); margin-bottom: 12px; }

        /* JOB DETAILS GRID */
        .details-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        @media (max-width: 500px) { .details-grid { grid-template-columns: 1fr; } }
        .detail-item { display: flex; gap: 10px; align-items: flex-start; }
        .detail-icon { font-size: 18px; flex-shrink: 0; margin-top: 1px; }
        .detail-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .04em; color: var(--text-3); }
        .detail-val { font-size: 14px; font-weight: 600; color: var(--text); margin-top: 1px; }

        /* DESCRIPTION */
        .job-description { font-size: 15px; line-height: 1.75; color: var(--text-2); }
        .job-description h1,.job-description h2,.job-description h3 { color:var(--text); margin:16px 0 8px; font-family:'Archivo',sans-serif; }
        .job-description ul,.job-description ol { padding-left: 20px; margin: 8px 0; }
        .job-description li { margin-bottom: 4px; }
        .job-description strong { color: var(--text); }

        /* FLYER */
        .flyer-wrap { margin-top: 20px; }
        .flyer-img { width: 100%; border-radius: var(--radius); border: 1px solid var(--border); }

        /* SIDEBAR */
        .sidebar { display: flex; flex-direction: column; gap: 16px; }

        .apply-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 24px; box-shadow: var(--shadow); }
        .apply-btn {
            display: block;
            width: 100%;
            background: var(--accent);
            color: #fff;
            font-family: 'Work Sans',sans-serif;
            font-size: 16px;
            font-weight: 700;
            padding: 14px 20px;
            border-radius: var(--radius);
            border: none;
            cursor: pointer;
            text-align: center;
            text-decoration: none;
            transition: all .15s;
            box-shadow: 0 3px 12px rgba(10,132,255,.3);
            margin-bottom: 12px;
        }
        .apply-btn:hover { background: #0070E0; transform: translateY(-1px); box-shadow: 0 5px 16px rgba(10,132,255,.4); }
        .apply-note { font-size: 12px; color: var(--text-3); text-align: center; }

        .share-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 20px; box-shadow: var(--shadow); }
        .share-title { font-size: 13px; font-weight: 700; margin-bottom: 12px; }
        .share-btns { display: flex; gap: 8px; }
        .share-btn { flex: 1; padding: 8px; border-radius: 8px; border: 1px solid var(--border); background: var(--bg); font-size: 12px; font-weight: 600; cursor: pointer; text-align:center; color:var(--text-2); transition: all .15s; }
        .share-btn:hover { background: var(--surface); border-color: var(--accent); color: var(--accent); }

        .locations-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 20px; box-shadow: var(--shadow); }
        .loc-list { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 8px; }
        .loc-tag { font-size: 11px; font-weight: 500; padding: 3px 8px; border-radius: 12px; background: var(--bg); border: 1px solid var(--border); color: var(--text-2); }

        /* Loading state */
        .skeleton { background: linear-gradient(90deg, var(--bg) 0%, var(--border) 50%, var(--bg) 100%); background-size: 200% 100%; animation: shimmer 1.4s infinite; border-radius: 6px; }
        @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
        .sk-line { height: 16px; margin-bottom: 8px; }
        .sk-title { height: 32px; width: 60%; margin-bottom: 12px; }

        /* Not found */
        .not-found { grid-column: 1/-1; text-align: center; padding: 80px 24px; }
        .not-found-icon { font-size: 48px; margin-bottom: 16px; }
        .not-found-title { font-family:'Archivo',sans-serif; font-size:22px; font-weight:800; margin-bottom:8px; }
        .not-found-sub { color: var(--text-2); margin-bottom:24px; }
        /* STICKY APPLY BUTTON */
        .apply-card.sticky {
            position: fixed;
            top: 76px; /* Below header (60px) + spacing */
            right: 20px;
            width: 340px;
            z-index: 90;
            animation: slideInSticky 0.3s ease-out;
        }

        @keyframes slideInSticky {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Mobile: stick to top of viewport */
        @media (max-width: 720px) {
            .apply-card.sticky {
                position: fixed;
                top: 60px; /* Just below header */
                left: 0;
                right: 0;
                width: 100%;
                border-radius: 0;
                border-left: none;
                border-right: none;
                box-shadow: 0 2px 8px rgba(0,0,0,0.12);
            }
        }
    </style>
</head>

<script>
const API = 'https://jobpeak-production.up.railway.app';

// ============================================================
// WHATJOBS S2S CONVERSION TRACKING
// ============================================================
let wjClickID = null;

// Capture wjClickID from URL on page load
function captureWhatJobsClickID() {
    const params = new URLSearchParams(window.location.search);
    const clickID = params.get('wjClickID');
    
    if (clickID) {
        wjClickID = clickID;
        // Store in sessionStorage so it persists if user navigates away and comes back
        sessionStorage.setItem('wjClickID', clickID);
        console.log('WhatJobs Click ID captured:', clickID);
    } else {
        // Check if we have one in storage from earlier in the session
        wjClickID = sessionStorage.getItem('wjClickID');
    }
}

// Fire WhatJobs S2S conversion tracking
async function fireWhatJobsConversion() {
    if (!wjClickID) {
        console.log('No WhatJobs Click ID - skipping conversion tracking');
        return;
    }

    const authKey = '71ca00e950a5054cac5afc0cb89abcb3';
    const trackingUrl = `https://api.whatjobs.com/api/v1/client/s2s/tracking?authKey=${authKey}&wjClickID=${wjClickID}`;

    try {
        // Fire the conversion tracking (use fetch with no-cors to avoid CORS issues)
        const response = await fetch(trackingUrl, {
            method: 'GET',
            mode: 'no-cors' // WhatJobs endpoint may not support CORS
        });
        
        console.log('WhatJobs conversion tracked for Click ID:', wjClickID);
        
        // Clear the stored click ID after successful tracking
        sessionStorage.removeItem('wjClickID');
    } catch (error) {
        console.error('WhatJobs conversion tracking error:', error);
    }
}

// ============================================================
// TALROO S2S CONVERSION TRACKING
// ============================================================
let tlrSid = null;

// Capture tlr_sid from URL on page load
function captureTalrooClickID() {
    const params = new URLSearchParams(window.location.search);
    const clickID = params.get('tlr_sid');
    
    if (clickID) {
        tlrSid = clickID;
        // Store in sessionStorage so it persists if user navigates away and comes back
        sessionStorage.setItem('tlr_sid', clickID);
        console.log('Talroo Click ID (tlr_sid) captured:', clickID);
    } else {
        // Check if we have one in storage from earlier in the session
        tlrSid = sessionStorage.getItem('tlr_sid');
    }
}

// Fire Talroo S2S conversion tracking
async function fireTalrooConversion() {
    if (!tlrSid) {
        console.log('No Talroo Click ID - skipping conversion tracking');
        return;
    }

    // Using conversion2.php for application completed events (default)
    const trackingUrl = `https://www.jobs2careers.com/conversion2.php?tlr_sid=${tlrSid}&Link=true`;

    try {
        // Fire the conversion tracking (use fetch with no-cors to avoid CORS issues)
        const response = await fetch(trackingUrl, {
            method: 'GET',
            mode: 'no-cors' // Talroo endpoint may not support CORS
        });
        
        console.log('Talroo conversion tracked for tlr_sid:', tlrSid);
        
        // Clear the stored click ID after successful tracking
        sessionStorage.removeItem('tlr_sid');
    } catch (error) {
        console.error('Talroo conversion tracking error:', error);
    }
}
// ============================================================

// Capture both click IDs immediately on page load
captureWhatJobsClickID();
captureTalrooClickID();

async function loadJob() {
    const params = new URLSearchParams(window.location.search);
    // Support both new slug URLs (/jobs/45-slug) and old query params (?id=45)
const pathMatch = window.location.pathname.match(/\/jobs\/(\d+)/);
const jobId = pathMatch ? pathMatch[1] : params.get('id');
    
    if (!jobId) {
        showNotFound('No job ID provided');
        return;
    }

    try {
        const res = await fetch(`${API}/jobs/${jobId}`);
        if (!res.ok) throw new Error('Job not found');
        const job = await res.json();
        renderJob(job);
    } catch(e) {
        showNotFound(e.message);
    }
}

function formatPay(job) {
    if (!job.salary && !job.pay_type) return null;
    const type = { hourly:'/hr', weekly:'/wk', annual:'/yr', cpm:'¢/mi', flat:'/load' }[job.pay_type] || '';
    return (job.salary || '') + (type ? ' ' + type : '');
}

// ============================================================
// GOOGLE FOR JOBS - JSON-LD STRUCTURED DATA
// ============================================================
function injectGoogleJobsSchema(job) {
    // Remove any existing schema
    const existingSchema = document.getElementById('google-jobs-schema');
    if (existingSchema) existingSchema.remove();
    
    // Parse location
    const location = job.hiring_location || job.location || '';
    const locationParts = location.split(',').map(s => s.trim());
    const city = locationParts[0] || '';
    const state = locationParts[1] || '';
    
    // Parse salary for structured data
    let baseSalary = null;
    if (job.salary) {
        const salaryClean = job.salary.replace(/[$,]/g, '');
        const salaryNums = salaryClean.match(/[\d.]+/g);
        if (salaryNums && salaryNums.length > 0) {
            const salaryValue = parseFloat(salaryNums[salaryNums.length - 1]);
            const unitText = {
                'hourly': 'HOUR',
                'weekly': 'WEEK', 
                'annual': 'YEAR',
                'cpm': 'HOUR',
                'flat': 'WEEK'
            }[job.pay_type] || 'YEAR';
            
            baseSalary = {
                "@type": "MonetaryAmount",
                "currency": "USD",
                "value": {
                    "@type": "QuantitativeValue",
                    "value": salaryValue,
                    "unitText": unitText
                }
            };
        }
    }
    
    // Employment type mapping
    const employmentTypeMap = {
        'full-time': 'FULL_TIME',
        'part-time': 'PART_TIME',
        'contract': 'CONTRACTOR',
        'temporary': 'TEMPORARY'
    };
    const employmentType = employmentTypeMap[(job.job_type || '').toLowerCase()] || 'FULL_TIME';
    
    // Build the structured data
    const schema = {
        "@context": "https://schema.org/",
        "@type": "JobPosting",
        "title": job.title,
        "description": job.description ? job.description.replace(/<[^>]*>/g, '') : job.title,
        "identifier": {
            "@type": "PropertyValue",
            "name": "Jobpeak",
            "value": `jobpeak-${job.id}`
        },
        "datePosted": job.created_at ? new Date(job.created_at).toISOString().split('T')[0] : new Date().toISOString().split('T')[0],
        "validThrough": (() => {
            const validDate = new Date();
            validDate.setDate(validDate.getDate() + 30);
            return validDate.toISOString().split('T')[0];
        })(),
        "employmentType": employmentType,
        "hiringOrganization": {
            "@type": "Organization",
            "name": job.company,
            "sameAs": job.logo_url ? `https://jobpeak.io/jobs/${job.id}` : undefined,
            "logo": job.logo_url || undefined
        },
        "jobLocation": {
            "@type": "Place",
            "address": {
                "@type": "PostalAddress",
                "addressLocality": city,
                "addressRegion": state,
                "addressCountry": "US"
            }
        },
        "applicantLocationRequirements": {
            "@type": "Country",
            "name": "US"
        }
    };
    
    // Add salary if available
    if (baseSalary) {
        schema.baseSalary = baseSalary;
    }
    
    // Add apply URL
    if (job.apply_url) {
        schema.directApply = true;
        schema.url = job.apply_url;
    }
    
    // Inject into head
    const script = document.createElement('script');
    script.id = 'google-jobs-schema';
    script.type = 'application/ld+json';
    script.textContent = JSON.stringify(schema, null, 2);
    document.head.appendChild(script);
    
    console.log('✅ Google for Jobs schema injected');
}
// ============================================================

function renderJob(job) {
    const pay = formatPay(job);
    const locs = (() => { try { return JSON.parse(job.target_locations || '[]'); } catch { return []; } })();
    
    const tags = [];
    if (pay) tags.push(`<span class="tag pay">💰 ${pay}</span>`);
    if (job.bonus) tags.push(`<span class="tag bonus">🎁 ${job.bonus} Bonus</span>`);
    if (job.job_type) tags.push(`<span class="tag">${job.job_type}</span>`);
    if (job.cdl_class) tags.push(`<span class="tag cdl">CDL-${job.cdl_class}</span>`);
    if (job.home_time) tags.push(`<span class="tag">🏠 ${job.home_time}</span>`);
    if (job.route_type) tags.push(`<span class="tag">🗺️ ${job.route_type}</span>`);

    const details = [];
    if (job.hiring_location || job.location) details.push({ icon:'📍', label:'Hiring Location', val: job.hiring_location || job.location });
    if (pay) details.push({ icon:'💵', label:'Pay', val: pay });
    if (job.bonus) details.push({ icon:'🎁', label:'Signing Bonus', val: job.bonus });
    if (job.category) details.push({ icon:'🏷️', label:'Category', val: job.category });
    if (job.cdl_class) details.push({ icon:'🚛', label:'CDL Class', val: 'Class ' + job.cdl_class });
    if (job.home_time) details.push({ icon:'🏠', label:'Home Time', val: job.home_time });
    if (job.route_type) details.push({ icon:'🗺️', label:'Route Type', val: job.route_type });
    if (job.experience_years != null) details.push({ icon:'📋', label:'Experience', val: job.experience_years + ' yr' + (job.experience_years !== 1 ? 's' : '') + ' min' });

    const logoHtml = job.logo_url
        ? `<div class="job-logo"><img src="${job.logo_url}" alt="${job.company} logo"></div>`
        : `<div class="job-logo-placeholder">🏢</div>`;

    const flyerHtml = job.flyer_url
        ? `<div class="flyer-wrap"><div class="section-label">Recruitment Flyer</div><img class="flyer-img" src="${job.flyer_url}" alt="Recruitment flyer"></div>`
        : '';

    const locsHtml = locs.length > 0
        ? `<div class="locations-card">
            <div class="share-title">📍 Advertising In</div>
            <div class="loc-list">${locs.map(l => `<span class="loc-tag">${l}</span>`).join('')}</div>
           </div>`
        : '';

    document.title = `${job.title} at ${job.company} — Jobpeak`;

    document.getElementById('pageContent').innerHTML = `
        <div class="breadcrumb" style="grid-column:1/-1">
            <a href="jobseeker_search.html">All Jobs</a>
            <span>›</span>
            <span>${job.category || 'Jobs'}</span>
            <span>›</span>
            <span>${job.title}</span>
        </div>

        <!-- MAIN -->
        <div class="main-card">
            <div class="job-header">
                ${logoHtml}
                <div class="job-title-block">
                    <div class="job-title">${job.title}</div>
                    <div class="job-company">${job.company}</div>
                    <div class="job-tags">${tags.join('')}</div>
                </div>
            </div>

            ${details.length > 0 ? `
            <div class="divider"></div>
            <div class="section-label">Position Details</div>
            <div class="details-grid">
                ${details.map(d => `
                    <div class="detail-item">
                        <div class="detail-icon">${d.icon}</div>
                        <div>
                            <div class="detail-label">${d.label}</div>
                            <div class="detail-val">${d.val}</div>
                        </div>
                    </div>
                `).join('')}
            </div>
            ` : ''}

            <div class="divider"></div>
            <div class="section-label">About the Role</div>
            <div class="job-description">${job.description || '<p>No description provided.</p>'}</div>

            ${flyerHtml}
        </div>

        <!-- SIDEBAR -->
        <div class="sidebar">
            <div class="apply-card">
                <a href="${job.apply_url || '#'}" class="apply-btn" target="_self" rel="noopener noreferrer" id="applyBtn">
                    Apply Now →
                </a>
                <div class="apply-note">You'll be taken to the application form</div>
            </div>

            <div class="share-card">
                <div class="share-title">Share this job</div>
                <div class="share-btns">
                    <button class="share-btn" onclick="copyLink()">🔗 Copy Link</button>
                    <button class="share-btn" onclick="shareEmail()">✉️ Email</button>
                </div>
            </div>

            ${locsHtml}
        </div>
    `;

    // Apply button — track WhatJobs + Talroo conversions then redirect
    const applyBtn = document.getElementById('applyBtn');
    if (applyBtn && job.apply_url) {
        applyBtn.addEventListener('click', async (e) => {
            e.preventDefault();
            
            // Fire both conversion tracking systems in parallel
            await Promise.all([
                fireWhatJobsConversion(),
                fireTalrooConversion()
            ]);
            
            // Also track the click in your backend for Jobpeak analytics
            try {
                const source = wjClickID ? 'whatjobs' : (tlrSid ? 'talroo' : 'direct');
                await fetch(`${API}/jobs/${job.id}/click`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ source })
                });
            } catch (err) {
                console.error('Click tracking error:', err);
            }
            
            // BUILD APPLY URL WITH UTM PARAMETERS
        let finalApplyUrl = job.apply_url;
        
        try {
            // Get current URL parameters
            const currentParams = new URLSearchParams(window.location.search);
            
            // Parse apply URL to add parameters
            const applyUrl = new URL(job.apply_url);
            
            // Pass through Talroo tracking
            if (tlrSid) {
                applyUrl.searchParams.set('tlr_sid', tlrSid);
                applyUrl.searchParams.set('utm_source', 'Talroo');
            }
            
            // Pass through WhatJobs tracking
            if (wjClickID) {
                applyUrl.searchParams.set('wjClickID', wjClickID);
                if (!tlrSid) { // Only set utm_source if Talroo didn't already
                    applyUrl.searchParams.set('utm_source', 'WhatJobs');
                }
            }
            
            // Pass through any other UTM parameters
            ['utm_medium', 'utm_campaign', 'utm_term', 'utm_content'].forEach(param => {
                const value = currentParams.get(param);
                if (value) {
                    applyUrl.searchParams.set(param, value);
                }
            });
            
            finalApplyUrl = applyUrl.toString();
            console.log('Redirecting to:', finalApplyUrl);
        } catch (err) {
            console.error('Error building apply URL:', err);
            // Fallback to original URL if URL parsing fails
            finalApplyUrl = job.apply_url;
        }
        
        // Redirect to apply URL with parameters
        window.location.href = finalApplyUrl;
        });
    }
    
    // Inject Google for Jobs structured data
    injectGoogleJobsSchema(job);
}

function showNotFound(msg) {
    document.getElementById('pageContent').innerHTML = `
        <div class="not-found">
            <div class="not-found-icon">🔍</div>
            <div class="not-found-title">Job Not Found</div>
            <div class="not-found-sub">${msg || "This job may have been removed or the link is incorrect."}</div>
            <a href="jobseeker_search.html" class="apply-btn" style="display:inline-block;text-decoration:none;max-width:200px;margin:0 auto">Browse All Jobs</a>
        </div>
    `;
}

function copyLink() {
    navigator.clipboard.writeText(window.location.href).then(() => alert('Link copied!'));
}
function shareEmail() {
    const title = document.querySelector('.job-title')?.textContent || 'Job';
    window.location.href = `mailto:?subject=${encodeURIComponent(title)}&body=${encodeURIComponent('Check out this job: ' + window.location.href)}`;
}
// STICKY APPLY BUTTON ON SCROLL
window.addEventListener('scroll', () => {
    const applyCard = document.querySelector('.apply-card');
    const sidebar = document.querySelector('.sidebar');
    
    if (!applyCard || !sidebar) return;
    
    const sidebarRect = sidebar.getBoundingClientRect();
    const headerHeight = 60;
    
    // On desktop: stick when sidebar scrolls past header
    // On mobile: stick immediately when scrolling down
    const isMobile = window.innerWidth <= 720;
    
    if (isMobile) {
        // Mobile: stick to top after scrolling 10px
        if (window.scrollY > 10) {
            applyCard.classList.add('sticky');
        } else {
            applyCard.classList.remove('sticky');
        }
    } else {
        // Desktop: stick when sidebar reaches top
        if (sidebarRect.top <= headerHeight + 16) {
            applyCard.classList.add('sticky');
        } else {
            applyCard.classList.remove('sticky');
        }
    }
});
    
loadJob();

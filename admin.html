
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Admin — Jobpeak</title>
    <link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@400;500;600;700&family=Archivo:wght@700;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg:#F4F5F7; --surface:#fff; --border:#E4E6EA; --text:#111318; --text-2:#545B6B; --text-3:#8892A4; --accent:#0A84FF; --success:#00C07F; --warn:#FF6B2B; --danger:#EF4444; --radius:10px; --radius-lg:16px; --shadow:0 1px 3px rgba(0,0,0,.08),0 4px 16px rgba(0,0,0,.04); }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'Work Sans',sans-serif; background:var(--bg); color:var(--text); -webkit-font-smoothing:antialiased; }
        .topnav { background:var(--surface); border-bottom:1px solid var(--border); padding:0 32px; height:56px; display:flex; align-items:center; justify-content:space-between; }
        .brand { font-family:'Archivo',sans-serif; font-size:22px; font-weight:800; color:var(--text); text-decoration:none; }
        .brand span { color:#F97316; }
        .page { max-width:900px; margin:0 auto; padding:32px 24px; }
        .page-title { font-family:'Archivo',sans-serif; font-size:24px; font-weight:800; margin-bottom:4px; }
        .page-sub { font-size:14px; color:var(--text-2); margin-bottom:24px; }
        .job-row { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-lg); padding:20px 24px; margin-bottom:12px; display:flex; align-items:center; gap:16px; box-shadow:var(--shadow); }
        .job-info { flex:1 }
        .job-title { font-size:15px; font-weight:700; margin-bottom:2px; }
        .job-meta { font-size:13px; color:var(--text-2); }
        .job-id { font-size:11px; color:var(--text-3); font-family:monospace; }
        .badge { font-size:11px; font-weight:700; padding:3px 10px; border-radius:20px; }
        .badge-active { background:#F0FFF8; color:var(--success); border:1px solid var(--success); }
        .badge-paused { background:#FFF3EC; color:var(--warn); border:1px solid var(--warn); }
        .badge-archived { background:var(--bg); color:var(--text-3); border:1px solid var(--border); }
        .actions { display:flex; gap:8px; flex-shrink:0; }
        .btn { font-family:'Work Sans',sans-serif; font-size:13px; font-weight:600; padding:7px 14px; border-radius:8px; border:none; cursor:pointer; transition:all .15s; text-decoration:none; }
        .btn-ghost { background:var(--bg); color:var(--text-2); border:1px solid var(--border); }
        .btn-ghost:hover { background:var(--border); }
        .btn-danger { background:#FEF2F2; color:var(--danger); border:1px solid #FECACA; }
        .btn-danger:hover { background:var(--danger); color:#fff; }
        .btn-pause { background:#FFF3EC; color:var(--warn); border:1px solid var(--warn); }
        .btn-pause:hover { background:var(--warn); color:#fff; }
        .btn-activate { background:#F0FFF8; color:var(--success); border:1px solid var(--success); }
        .btn-activate:hover { background:var(--success); color:#fff; }
        .loading { text-align:center; padding:60px; color:var(--text-3); }
        .empty { text-align:center; padding:60px; color:var(--text-3); }
        .confirm-overlay { position:fixed; inset:0; background:rgba(0,0,0,.5); display:none; align-items:center; justify-content:center; z-index:100; }
        .confirm-overlay.show { display:flex; }
        .confirm-box { background:var(--surface); border-radius:var(--radius-lg); padding:32px; max-width:400px; width:90%; text-align:center; }
        .confirm-title { font-family:'Archivo',sans-serif; font-size:18px; font-weight:800; margin-bottom:8px; }
        .confirm-sub { font-size:14px; color:var(--text-2); margin-bottom:24px; }
        .confirm-btns { display:flex; gap:10px; justify-content:center; }
    </style>
</head>
<body>
<nav class="topnav">
    <a href="/" class="brand">jobpeak<span>.</span></a>
    <div style="display:flex;gap:8px">
        <a href="jobseeker_search.html" style="font-size:14px;color:var(--text-2);text-decoration:none;padding:6px 12px">Search</a>
        <a href="job_builder.html" style="font-size:14px;color:var(--accent);text-decoration:none;padding:6px 12px">+ Post Job</a>
    </div>
</nav>

<div class="page">
    <div class="page-title">Job Admin</div>
    <div class="page-sub">Manage all jobs · Archive stops a job from running but preserves all click data · Changes reflect in XML feeds immediately</div>
    <div id="jobList"><div class="loading">Loading jobs…</div></div>
</div>

<!-- Confirm Delete -->
<div class="confirm-overlay" id="confirmOverlay">
    <div class="confirm-box">
        <div class="confirm-title">Archive this job?</div>
        <div class="confirm-sub" id="confirmSub">This will remove it from the database and all XML feeds permanently.</div>
        <div class="confirm-btns">
            <button class="btn btn-ghost" onclick="closeConfirm()">Cancel</button>
            <button class="btn btn-danger" id="confirmBtn">Delete</button>
        </div>
    </div>
</div>

<script>
const API = 'https://jobpeak-production.up.railway.app';
let allJobs = [];
let pendingDeleteId = null;

async function loadJobs() {
    try {
        const res = await fetch(`${API}/jobs?limit=200`);
        allJobs = await res.json();
        render();
    } catch(e) {
        document.getElementById('jobList').innerHTML = `<div class="empty">Error loading jobs: ${e.message}</div>`;
    }
}

function render() {
    if (allJobs.length === 0) {
        document.getElementById('jobList').innerHTML = '<div class="empty">No jobs found.</div>';
        return;
    }

    document.getElementById('jobList').innerHTML = allJobs.map(job => `
        <div class="job-row" id="row-${job.id}">
            <div class="job-info">
                <div class="job-title">${job.title}</div>
                <div class="job-meta">${job.company} · ${job.hiring_location || job.location || '—'} · ${job.category || 'uncategorized'}</div>
                <div class="job-id">ID: ${job.id} · Posted: ${new Date(job.created_at).toLocaleDateString()}</div>
            </div>
            <span class="badge ${job.status === 'active' ? 'badge-active' : 'badge-paused'}">
                ${job.status === 'active' ? '● Active' : '⏸ Paused'}
            </span>
            <div class="actions">
                <a href="results.html?job=${job.id}" class="btn btn-ghost" target="_blank">Results</a>
                <a href="job_detail.html?id=${job.id}" class="btn btn-ghost" target="_blank">View</a>
                ${job.status === 'active'
                    ? `<button class="btn btn-pause" onclick="setStatus(${job.id}, 'paused')">Pause</button>`
                    : `<button class="btn btn-activate" onclick="setStatus(${job.id}, 'active')">Activate</button>`
                }
                <button class="btn btn-danger" onclick="confirmDelete(${job.id}, '${job.title.replace(/'/g, "\\'")}')">Delete</button>
            </div>
        </div>
    `).join('');
}

async function setStatus(id, status) {
    try {
        const res = await fetch(`${API}/jobs/${id}/status`, {
            method: 'PATCH',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ status })
        });
        const data = await res.json();
        if (data.success) {
            const job = allJobs.find(j => j.id === id);
            if (job) job.status = status;
            render();
        }
    } catch(e) {
        alert('Error: ' + e.message);
    }
}

function confirmArchive(id, title) {
    document.getElementById('confirmSub').textContent = `"${title}" will stop running and be removed from all feeds. Click history and results are preserved forever.`;
    document.getElementById('confirmBtn').onclick = () => { closeConfirm(); setStatus(id, 'archived'); };
    document.getElementById('confirmOverlay').classList.add('show');
}

function closeConfirm() {
    document.getElementById('confirmOverlay').classList.remove('show');
}

loadJobs();
</script>
</body>
</html>
